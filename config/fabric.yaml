ingestion:
  # Phase 4: RabbitMQ is now the real transport. Switch back to file_watch
  # for local dev without a broker running — watch_dir stays valid either
  # way, it's just unused when backend = rabbitmq.
  backend: rabbitmq
  watch_dir: events/input
  rabbitmq:
    url: amqp://guest:guest@localhost:5672/%2f
    queue: zenfabrique.events

control_plane:
  fuseki_url: http://localhost:3030/zenfabrique
  shapes_path: control-plane/shacl/streaming-event-shape.ttl
  username: admin
  password: admin

data_plane:
  duckdb_path: data-plane/zenfabrique.duckdb

# Phase 5: gates self-healing schema mutations (alias learning) through OPA.
# Comment out / remove this whole section for local dev without OPA running —
# schema mutations then go unrestricted rather than the orchestrator refusing
# to start.
policy_plane:
  opa_url: http://localhost:8181

# Phase 5: encrypts msPlayed via FHE at ingest time, so the numeric usage
# value is never stored in the clear (only in the raw JSON payload, which
# is the existing audit log — see STATUS.md for the accepted scope note on
# what this does and doesn't protect). Comment out / remove this whole
# section for local dev without the FHE service running.
privacy_plane:
  fhe_url: http://localhost:8090

logging:
  level: info
